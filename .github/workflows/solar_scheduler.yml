name: Daily Solar Charging Scheduler

on:
  schedule:
    # Runs at 19:00 UTC (7:00 PM GMT / 8:00 PM BST) every day
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry Run Mode (saves preview files locally on the runner, does not send messages)'
        required: true
        type: boolean
        default: false

jobs:
  run-scheduler:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Run Solar Scheduler Agent
      env:
        WHATSAPP_PHONE: ${{ secrets.WHATSAPP_PHONE }}
        WHATSAPP_APIKEY: ${{ secrets.WHATSAPP_APIKEY }}
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
        SOLAR_CHANNEL: ${{ secrets.SOLAR_CHANNEL }}
        SOLAR_LATITUDE: "51.458"
        SOLAR_LONGITUDE: "0.208"
        SOLAR_TILT: "35"
        SOLAR_AZIMUTH: "45"
      run: |
        if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
          echo "Executing in manual Dry Run mode..."
          python solar_scheduler.py --dry-run
        else
          python solar_scheduler.py
        fi

    - name: Upload Preview Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: solar-scheduler-previews
        path: |
          last_whatsapp.txt
          last_email.html
          last_email.txt
        if-no-files-found: ignore
